services:
  # -----------------------------
  # Execution Layer (Reth) — full/pruned (non-archive) L1 node
  # -----------------------------
  reth:
    image: ghcr.io/paradigmxyz/reth:v1.11.1
    container_name: reth
    restart: unless-stopped

    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

    command:
      - node
      - --minimal
      - --chain
      - mainnet
      - --datadir
      - /data

      # HTTP RPC (op-node uses this as L1; debug for --l1.rpckind=debug_geth)
      - --http
      - --http.addr
      - 0.0.0.0
      - --http.port
      - "8545"
      - --http.api
      - eth,net,web3,rpc,admin,debug

      # WS (for subscriptions; debug for L1 tooling)
      - --ws
      - --ws.addr
      - 0.0.0.0
      - --ws.port
      - "8546"
      - --ws.api
      - eth,net,web3,rpc,admin,debug

      # Engine API for Lighthouse (JWT protected; host publishes to 127.0.0.1 only)
      - --authrpc.addr
      - 0.0.0.0
      - --authrpc.port
      - "8551"
      - --authrpc.jwtsecret
      - /jwt/jwt.hex

      # RPC cache: faster L1 responses for op-node (getBlockByNumber, receipts, etc.)
      - --rpc-cache.max-blocks
      - "10000"
      - --rpc-cache.max-receipts
      - "10000"
      - --rpc-cache.max-concurrent-db-requests
      - "2048"

      # P2P (discv4 on 30303; discv5 uses default 9200 — same port would cause "Address already in use")
      - --port
      - "30303"
      - --discovery.port
      - "30303"
      - --enable-discv5-discovery
      - --dns-retries
      - "3"

      # Peer reliability (from reth docs: persist peers, filter wrong-network)
      - --peers-file
      - /data/peers.txt
      - --enforce-enr-fork-id

      # Peer tuning
      - --max-outbound-peers
      - "200"
      - --max-inbound-peers
      - "200"
      - --nat
      - extip:71.175.190.232

      # Metrics 
      - --metrics
      - 0.0.0.0:9001

    volumes:
      # Bind mount: host reth-data/ → container /data. So container /data/db = reth-data/db, /data/static_files = reth-data/static_files. Put snapshot there.
      - ./reth-data:/data
      - ./reth.toml:/data/reth.toml
      - ./jwt:/jwt

    ports:
      # Local-only RPC on host
      - "127.0.0.1:8545:8545"
      - "127.0.0.1:8546:8546"
      - "127.0.0.1:8551:8551"

      # Public P2P (discv4: 30303; discv5: 9200)
      - "30303:30303/tcp"
      - "30303:30303/udp"
      - "9200:9200/udp"

      # Local-only metrics on host
      - "127.0.0.1:9001:9001"

    # Image has no curl/wget; use bash /dev/tcp to check RPC port is open
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/127.0.0.1/8545'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

    deploy:
      resources:
        reservations:
          memory: 4G

    networks:
      - eth-network


  # -----------------------------
  # Consensus Layer (Lighthouse)
  # -----------------------------
  lighthouse:
    image: sigp/lighthouse:latest
    container_name: lighthouse
    restart: unless-stopped
    depends_on:
      reth: { condition: service_healthy }

    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

    command:
      - lighthouse
      - beacon_node
      - --network
      - mainnet

      # Connect to reth engine API
      - --execution-endpoint
      - http://reth:8551
      - --execution-jwt
      - /jwt/jwt.hex

      # Fast initial sync
      - --checkpoint-sync-url
      - https://mainnet.checkpoint.sigp.io

      # Beacon REST API (container binds 0.0.0.0; host publishes to 127.0.0.1 only)
      - --http
      - --http-address
      - 0.0.0.0
      - --http-port
      - "5052"

      # Peer tuning
      - --target-peers
      - "150"

      # P2P ports
      - --port
      - "9000"
      - --discovery-port
      - "9000"
      - --quic-port
      - "9001"

      # Metrics
      - --metrics
      - --metrics-address
      - 0.0.0.0
      - --metrics-port
      - "8008"

      - --datadir
      - /data

    volumes:
      - ./lighthouse-data:/data
      - ./jwt:/jwt

    ports:
      # Local-only Beacon REST API on host
      - "127.0.0.1:5052:5052"

      # Public P2P
      - "9000:9000/tcp"
      - "9000:9000/udp"
      - "9001:9001/udp"

      # Local-only metrics on host
      - "127.0.0.1:8008:8008"

    # Minimal image may lack wget/curl; check Beacon API port is open. Prefer nc (Alpine/Debian), fallback bash (Ubuntu).
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5052 2>/dev/null || bash -c 'echo >/dev/tcp/127.0.0.1/5052'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

    deploy:
      resources:
        reservations:
          memory: 4G
    networks:
      - eth-network

  # -----------------------------
  # L2 Base execution (op-reth); Flashblocks-ready for future sub-200ms use.
  # Pruned node: restore from official Base pruned snapshot into base-reth-data
  # (chaindata, nodes, segments at /data in container). See SETUP.md §11.
  # -----------------------------
  base-reth:
    image: ghcr.io/base/node-reth:v0.14.8
    container_name: base-reth
    restart: unless-stopped
    # Image binary is at /app/base-reth-node (not "node" in PATH); "node" is the subcommand
    entrypoint: ["/app/base-reth-node"]
    depends_on:
      reth: { condition: service_healthy }
      lighthouse: { condition: service_healthy }

    # Reliable DNS so Flashblocks WS (mainnet.flashblocks.base.org) resolves; avoids "Temporary failure in name resolution"
    dns:
      - 8.8.8.8
      - 1.1.1.1

    #environment:
      # Flashblocks: optional; node stays backward-compatible (2s blocks). Use when algo supports it.
      #- RETH_FB_WEBSOCKET_URL=wss://mainnet.flashblocks.base.org/ws

    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

    command:
      - node
      - --chain
      - base
      - --datadir
      - /data

      # Rollup: sequencer + disable P2P tx gossip (replica node)
      - --rollup.sequencer-http
      - https://mainnet-sequencer.base.org
      - --rollup.disable-tx-pool-gossip

      # Flashblocks (sub-200ms); RPC remains backward-compatible until you use new APIs
      #- --websocket-url=wss://mainnet.flashblocks.base.org/ws

      # Engine API for op-node (JWT)
      - --authrpc.addr
      - 0.0.0.0
      - --authrpc.port
      - "8552"
      - --authrpc.jwtsecret
      - /jwt/jwt.hex

      # HTTP/WS RPC (L2 API)
      - --http
      - --http.addr
      - 0.0.0.0
      - --http.port
      - "8547"
      - --http.api
      - eth,net,web3,rpc,admin,debug,txpool,miner
      - --http.corsdomain
      - "*"
      - --ws
      - --ws.addr
      - 0.0.0.0
      - --ws.port
      - "8548"
      - --ws.api
      - eth,net,web3,rpc,admin,debug,txpool,miner
      - --ws.origins
      - "*"

      # Low-latency: keep blocks in memory, reduce persistence stalls
      - --engine.memory-block-buffer-target
      - "2"
      - --engine.persistence-threshold
      - "2"
      # RPC cache for fast eth_call / arbitrage
      - --rpc-cache.max-blocks
      - "10000"
      - --rpc-cache.max-receipts
      - "10000"
      - --rpc-cache.max-concurrent-db-requests
      - "2048"
      
      # IPC
      - --ipcpath
      - /data/base-reth.ipc
      # P2P (discv4 + discv5). Bootnodes from Base mainnet (port 30301) for faster discovery.
      # discv5 uses a separate port (default 9200); L1 reth uses 9200, so use 9201 for base-reth and expose it.
      - --port
      - "30305"
      - --discovery.port
      - "30305"
      - --enable-discv5-discovery
      - --discovery.v5.port
      - "9201"
      - --bootnodes
      - "enode://87a32fd13bd596b2ffca97020e31aef4ddcc1bbd4b95bb633d16c1329f654f34049ed240a36b449fda5e5225d70fe40bc667f53c304b71f8e68fc9d448690b51@3.231.138.188:30301,enode://ca21ea8f176adb2e229ce2d700830c844af0ea941a1d8152a9513b966fe525e809c3a6c73a2c18a12b74ed6ec4380edf91662778fe0b79f6a591236e49e176f9@184.72.129.189:30301,enode://acf4507a211ba7c1e52cdf4eef62cdc3c32e7c9c47998954f7ba024026f9a6b2150cd3f0b734d9c78e507ab70d59ba61dfe5c45e1078c7ad0775fb251d7735a2@3.220.145.177:30301,enode://8a5a5006159bf079d06a04e5eceab2a1ce6e0f721875b2a9c96905336219dbe14203d38f70f3754686a6324f786c2f9852d8c0dd3adac2d080f4db35efc678c5@3.231.11.52:30301,enode://cdadbe835308ad3557f9a1de8db411da1a260a98f8421d62da90e71da66e55e98aaa8e90aa7ce01b408a54e4bd2253d701218081ded3dbe5efbbc7b41d7cef79@54.198.153.150:30301"
      - --peers-file
      - /data/peers.txt
      - --max-outbound-peers
      - "150"
      - --max-inbound-peers
      - "150"
      - --nat
      - extip:71.175.190.232

      # Metrics
      - --metrics
      - 0.0.0.0:9002

    volumes:
      - ./base-reth-data:/data
      - ./jwt:/jwt:ro

    ports:
      - "127.0.0.1:8547:8547"
      - "127.0.0.1:8548:8548"
      - "127.0.0.1:8552:8552"
      - "30305:30305/tcp"
      - "30305:30305/udp"
      - "9201:9201/udp"
      - "127.0.0.1:9002:9002"

    # Image may not have curl; check RPC port 8547 is open (same approach as reth/lighthouse)
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/127.0.0.1/8547'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 180s

    deploy:
      resources:
        reservations:
          memory: 8G
    networks:
      - eth-network

  # -----------------------------
  # L2 Base rollup client (op-node)
  # Connects to local L1 (reth + lighthouse) and base-reth engine.
  # -----------------------------
  rollup-client:
    # OP Stack rollup client (same binary for Base, OP Mainnet, etc.; chain = --network=base-mainnet)
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node:v1.16.7
    container_name: rollup-client
    restart: unless-stopped
    # Image may not set ENTRYPOINT; ensure op-node binary is used and our command is the args
    entrypoint: ["op-node"]
    depends_on:
      base-reth: { condition: service_healthy }

    dns:
      - 8.8.8.8
      - 1.1.1.1

    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

    command:
      - --network=base-mainnet
      - --syncmode=execution-layer

      # L1: your local reth + lighthouse (minimal latency)
      #- --l1=http://reth:8545
      - --l1=ws://reth:8546
      - --l1.beacon=http://lighthouse:5052
      - --l1.trustrpc=true
      - --l1.rpckind=debug_geth

      # L1 concurrency and polling (ultra-low latency; default was 12s)
      - --l1.max-concurrency=100
      - --l1.rpc-max-batch-size=50
      #- --l1.http-poll-interval=500ms

      # L2 engine (base-reth)
      - --l2=http://base-reth:8552
      - --l2.enginekind=reth
      - --l2.jwt-secret=/jwt/jwt.hex
      - --l2.engine-rpc-timeout=5s

      # L1 confirmations before accepting L2 (4 = safe; 0 = minimum latency, higher reorg risk)
      - --verifier.l1-confs=1

      # P2P (discv5; must be reachable for peer discovery). v1.16.x expects port only; bind IP is --p2p.listen.ip (default 0.0.0.0)
      - --p2p.listen.tcp=9222
      - --p2p.listen.udp=9222
      - --p2p.advertise.ip=71.175.190.232
      - --p2p.advertise.tcp=9222
      - --p2p.advertise.udp=9222
      - --p2p.peers.hi=100

      # RPC (sync status; primary L2 RPC is base-reth:8547)
      - --rpc.addr=0.0.0.0
      - --rpc.port=7545

      # Metrics
      - --metrics.enabled
      - --metrics.addr=0.0.0.0
      - --metrics.port=7300

    volumes:
      - ./jwt:/jwt:ro

    ports:
      - "127.0.0.1:7545:7545"
      - "9222:9222/tcp"
      - "9222:9222/udp"
      - "127.0.0.1:7300:7300"

    # Image may not have curl; check RPC/sync port 7545 is open. Try nc (Alpine) then bash (Debian/Ubuntu).
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 7545 2>/dev/null || bash -c 'echo >/dev/tcp/127.0.0.1/7545'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

    deploy:
      resources:
        reservations:
          memory: 2G
    networks:
      - eth-network

  # -----------------------------
  # Monitoring (Prometheus + Grafana)
  # -----------------------------
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=32GB
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    # Bind 0.0.0.0 so reachable via Tailscale (and localhost)
    ports:
      - "9090:9090"
    networks:
      - eth-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Use relative URL so it works via localhost or Tailscale IP
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_DASHBOARDS_DEFAULT_HOME=stack-health
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    # Bind 0.0.0.0 so reachable via Tailscale (and localhost)
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - eth-network


networks:
  eth-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data: