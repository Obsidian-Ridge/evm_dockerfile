# Compose Specification (no version key; see https://docs.docker.com/reference/compose-file/version-and-name/)
services:
  # -----------------------------
  # Execution Layer (Reth)
  # -----------------------------
  reth:
    image: ghcr.io/paradigmxyz/reth:latest
    container_name: reth
    restart: unless-stopped

    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

    command:
      - node
      - --chain
      - mainnet
      - --datadir
      - /data

      # HTTP RPC (container binds 0.0.0.0; host publishes to 127.0.0.1 only)
      - --http
      - --http.addr
      - 0.0.0.0
      - --http.port
      - "8545"
      - --http.api
      - eth,net,web3,rpc,admin

      # WS (optional)
      - --ws
      - --ws.addr
      - 0.0.0.0
      - --ws.port
      - "8546"
      - --ws.api
      - eth,net,web3,rpc,admin

      # Engine API for Lighthouse (JWT protected; host publishes to 127.0.0.1 only)
      - --authrpc.addr
      - 0.0.0.0
      - --authrpc.port
      - "8551"
      - --authrpc.jwtsecret
      - /jwt/jwt.hex

      # P2P
      - --port
      - "30303"
      - --discovery.port
      - "30303"
      - --enable-discv5-discovery

      # Peer tuning
      - --max-outbound-peers
      - "150"
      - --max-inbound-peers
      - "150"

      # Metrics (THIS IS THE CORRECT FORMAT FOR YOUR RETH)
      - --metrics
      - 0.0.0.0:9001

    volumes:
      - ./reth-data:/data
      - ./jwt:/jwt

    ports:
      # Local-only RPC on host
      - "127.0.0.1:8545:8545"
      - "127.0.0.1:8546:8546"
      - "127.0.0.1:8551:8551"

      # Public P2P
      - "30303:30303/tcp"
      - "30303:30303/udp"

      # Local-only metrics on host
      - "127.0.0.1:9001:9001"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8545"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    networks:
      - eth-network


  # -----------------------------
  # Consensus Layer (Lighthouse)
  # -----------------------------
  lighthouse:
    image: sigp/lighthouse:latest
    container_name: lighthouse
    restart: unless-stopped
    depends_on:
      - reth

    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

    command:
      - lighthouse
      - beacon_node
      - --network
      - mainnet

      # Connect to reth engine API
      - --execution-endpoint
      - http://reth:8551
      - --execution-jwt
      - /jwt/jwt.hex

      # Fast initial sync
      - --checkpoint-sync-url
      - https://mainnet.checkpoint.sigp.io

      # Beacon REST API (container binds 0.0.0.0; host publishes to 127.0.0.1 only)
      - --http
      - --http-address
      - 0.0.0.0
      - --http-port
      - "5052"

      # Peer tuning
      - --target-peers
      - "150"

      # P2P ports
      - --port
      - "9000"
      - --discovery-port
      - "9000"
      - --quic-port
      - "9001"

      # Metrics
      - --metrics
      - --metrics-address
      - 0.0.0.0
      - --metrics-port
      - "8008"

      - --datadir
      - /data

    volumes:
      - ./lighthouse-data:/data
      - ./jwt:/jwt

    ports:
      # Local-only Beacon REST API on host
      - "127.0.0.1:5052:5052"

      # Public P2P
      - "9000:9000/tcp"
      - "9000:9000/udp"
      - "9001:9001/udp"

      # Local-only metrics on host
      - "127.0.0.1:8008:8008"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5052/eth/v1/node/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    networks:
      - eth-network


networks:
  eth-network:
    driver: bridge